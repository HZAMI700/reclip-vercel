<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReClip V2 ?" Next-Gen Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --fg: #fafafa;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --muted: #a1a1aa;
      --card: #18181b;
      --card-border: #27272a;
      --success: #10b981;
      --error: #ef4444;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 600px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 {
      font-weight: 800;
      font-size: 3rem;
      background: -webkit-linear-gradient(45deg, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: var(--muted);
      font-size: 1rem;
    }

    .input-box {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }

    input[type="text"] {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--fg);
      font-size: 1rem;
      outline: none;
      padding: 8px 0;
    }

    .controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid var(--card-border);
      padding-top: 12px;
    }

    .format-switch {
      display: flex;
      background: var(--bg);
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--card-border);
    }

    .format-switch button {
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 6px 12px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 500;
      transition: all 0.2s;
    }

    .format-switch button.active {
      background: var(--fg);
      color: var(--bg);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .cards {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 15px;
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .thumb {
      width: 120px;
      height: 80px;
      border-radius: 8px;
      background: var(--card-border);
      object-fit: cover;
    }

    .info {
      flex: 1;
      overflow: hidden;
    }

    .title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 5px;
    }

    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .action-btn {
      background: var(--fg);
      color: var(--bg);
      border: none;
      padding: 6px 14px;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.8rem;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
    }
    .action-btn:hover { background: #e5e5e5; }
    
    .error-msg {
      color: var(--error);
      font-size: 0.85rem;
      margin-top: 5px;
    }
    
    .loader {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: #fff;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>ReClip</h1>
      <p class="subtitle">Lightning Fast Media Downloader</p>
    </header>

    <div class="input-box">
      <input type="text" id="url" placeholder="Paste video URL here..." onkeypress="if(event.key === 'Enter') fetchVideo()">
      <div class="controls">
        <div class="format-switch">
          <button id="fmt-video" class="active" onclick="setFormat('video')">MP4</button>
          <button id="fmt-audio" onclick="setFormat('audio')">MP3</button>
        </div>
        <button id="fetchBtn" class="btn-primary" onclick="fetchVideo()">Fetch</button>
      </div>
    </div>

    <div id="cards" class="cards"></div>
  </div>

  <script>
    let currentFormat = 'video';

    function setFormat(fmt) {
      currentFormat = fmt;
      document.getElementById('fmt-video').classList.toggle('active', fmt === 'video');
      document.getElementById('fmt-audio').classList.toggle('active', fmt === 'audio');
    }

    async function fetchVideo() {
      const url = document.getElementById('url').value.trim();
      if(!url) return;

      const cards = document.getElementById('cards');
      const btn = document.getElementById('fetchBtn');
      
      btn.disabled = true;
      btn.innerHTML = '<div class="loader"></div>';
      
      cards.innerHTML = `
        <div class="card" style="opacity: 0.6;">
          <div class="thumb"></div>
          <div class="info">
            <div class="title">Extracting video info...</div>
            <div class="meta">Please wait a moment</div>
          </div>
        </div>
      `;

      try {
        const resInfo = await fetch('/api/info', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url})
        });
        const info = await resInfo.json();

        if (info.error) throw new Error(info.error);

        cards.innerHTML = `
          <div class="card">
            <img src="${info.thumbnail}" class="thumb" onerror="this.style.display='none'">
            <div class="info">
              <div class="title">${info.title || 'Video'}</div>
              <div class="meta">${info.uploader || 'Unknown'} &bull; Getting direct link...</div>
            </div>
          </div>
        `;

        const resDl = await fetch('/api/download', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({url, format: currentFormat})
        });
        const dl = await resDl.json();

        if (dl.error) throw new Error(dl.error);

        cards.innerHTML = `
          <div class="card">
            <img src="${info.thumbnail}" class="thumb" onerror="this.style.display='none'">
            <div class="info">
              <div class="title">${info.title || 'Video'}</div>
              <div class="meta">${info.uploader || 'Unknown'} &bull; Ready to download</div>
              <a href="${dl.direct_url}" download="${dl.filename}" target="_blank" class="action-btn">Download File</a>
            </div>
          </div>
        `;
      } catch (err) {
        cards.innerHTML = `
          <div class="card" style="border-color: rgba(239, 68, 68, 0.3);">
            <div class="info">
              <div class="title" style="color: var(--error);">Error Processing Video</div>
              <div class="error-msg">${err.message}</div>
            </div>
          </div>
        `;
      } finally {
        btn.disabled = false;
        btn.innerHTML = 'Fetch';
      }
    }
  </script>
</body>
</html>
